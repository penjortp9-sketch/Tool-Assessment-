<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Productive Self-Assessment Tool</title>
    <link rel="stylesheet" href="style.css">     
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <h1>Personal Productive Self-Assessment Tool</h1>
            <p>Welcome back, Smart Worker! 🌿</p>
            <input type="text" id="username" placeholder="Your Name" value="Penjor" required>
            <input type="password" id="password" placeholder="Password (any for demo)">
            <button onclick="login()">Enter</button>
        </div>

        <!-- Main Dashboard -->
        <div id="main-screen" class="screen hidden">         
            <header>
                <h2>Good morning, <span id="greeting-name"></span>!</h2>
                <p>THIMPHU • BHUTAN • <span id="current-date"></span></p>
                <button onclick="logout()">Logout</button>
            </header>

            <form id="planning-form">
                <h3>Daily Planning Quiz</h3>
                
                <label>1. What are you going to do today?</label>
                <input type="text" id="tasks" placeholder="e.g., Website development and story writing" required>

                <label>2. How many hours are you going to spend on work today?</label>
                <input type="number" id="total-hours" min="1" max="12" value="6" required>

                <label>3. How many blocks do you want to divide your work into?</label>
                <input type="number" id="blocks" min="1" max="8" value="3" required>

                <label>4. Divide your work into blocks:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="block-tasks" placeholder="e.g., Block 1 (2h), Block 2 (2h), Block 3 (2h)" required>
                    <button type="button" onclick="autoGenerateBlocksManual()" style="flex: 0 0 auto; width: auto; padding: 12px 20px;">Auto-Generate</button>
                </div>

                <label>5. Rate your productivity at the end of the day (1-10):</label>
                <input type="range" id="productivity" min="1" max="10" value="7">
                <span id="rating-value">7</span>/10

                <label>6. Comments / Reflections:</label>
                <textarea id="comments" rows="4" placeholder="What went well? Any distractions?"></textarea>

                <button type="button" onclick="saveEntry()">Save Today's Entry</button>
            </form>

            <div id="summary" class="hidden">
                <h3>Today's Plan Summary</h3>
                <p><strong>Tasks:</strong> <span id="sum-tasks"></span></p>
                <p><strong>Block Tasks:</strong> <span id="sum-block-tasks"></span></p>
                <p><strong>Total Hours:</strong> <span id="sum-hours"></span></p>
                <p><strong>Blocks:</strong> <span id="sum-blocks"></span> × <span id="sum-per-block"></span> hours</p>
                <p><strong>Productivity Rating:</strong> <span id="sum-rating"></span>/10</p>
                <p><strong>Your Notes:</strong> <span id="sum-comments"></span></p>
            </div>

            <div class="reflection">
                <h3>What I Learned Today</h3>
                <ul id="lessons-list">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
